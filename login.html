<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaNet - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0F2D52',
                        secondary: '#00C2FF',
                        accent: '#22C55E',
                        background: '#F8FAFC'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4 font-sans relative overflow-hidden">

    <!-- Decorative Background Elements -->
    <div class="absolute top-0 left-0 w-full h-96 bg-primary rounded-b-[100px] sm:rounded-b-[200px] shadow-2xl z-0"></div>
    <div class="absolute top-10 right-10 w-64 h-64 bg-secondary rounded-full opacity-20 blur-3xl z-0"></div>

    <!-- Login Container -->
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 relative z-10 border border-gray-100">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center space-x-2 mb-4">
                <div class="flex items-center justify-center bg-primary rounded-lg w-12 h-12 shadow-md">
                    <svg class="w-7 h-7 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <span class="text-3xl font-bold tracking-tight text-primary">Mega<span class="text-secondary">Net</span></span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Welcome Back</h1>
            <p class="text-sm text-gray-500 mt-1">Sign in to access your digital services</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-5">
            
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path></svg>
                    </div>
                    <input id="email" type="email" placeholder="you@example.com" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-secondary focus:border-secondary transition outline-none text-gray-800" required>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
                    <a href="#" class="text-xs font-semibold text-secondary hover:text-primary transition">Forgot Password?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <input id="password" type="password" placeholder="••••••••" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-secondary focus:border-secondary transition outline-none text-gray-800" required>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-primary hover:bg-blue-900 text-white py-3.5 rounded-xl font-bold shadow-lg transition duration-200 flex justify-center items-center">
                <span>Secure Login</span>
            </button>

        </form>

        <!-- Message Box -->
        <div id="messageBox" class="mt-4 text-center text-sm font-semibold hidden"></div>

        <!-- Footer link -->
        <p class="text-center mt-8 text-sm text-gray-600">
            Don't have an account? 
            <a href="register.html" class="text-secondary font-bold hover:underline">Create Account</a>
        </p>

    </div>

    <!-- Supabase Authentication Script -->
    <script type="module">
        // Import Supabase client from your JS folder
        import { supabase } from "./js/supabase-config.js";

        const loginForm = document.getElementById("loginForm");
        const loginBtn = document.getElementById("loginBtn");
        const messageBox = document.getElementById("messageBox");

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            // Update UI to show loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Authenticating...
            `;
            messageBox.classList.add("hidden");

            // Execute Supabase Login
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                // Show Error Message
                messageBox.innerHTML = `<span class='text-red-500'>${error.message}</span>`;
                messageBox.classList.remove("hidden");
                
                // Reset Button
                loginBtn.disabled = false;
                loginBtn.innerHTML = "<span>Secure Login</span>";
            } else {
                // Show Success Message
                messageBox.innerHTML = "<span class='text-accent'>Authentication Successful! Redirecting...</span>";
                messageBox.classList.remove("hidden");

                // Route to Customer Dashboard
                setTimeout(() => {
                    window.location.href = "/dashboard/customer.html";
                }, 1000);
            }
        });
    </script>

</body>
</html>
