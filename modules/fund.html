<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaNet - Fund Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Paystack Inline JS -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: { primary: '#0F2D52', secondary: '#00C2FF', accent: '#22C55E', background: '#F8FAFC' }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex flex-col bg-background font-sans text-gray-800">

    <!-- Top Navigation -->
    <nav class="bg-primary text-white px-6 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <span class="text-2xl font-bold tracking-wider text-secondary">MEGANET</span>
        </div>
        <a href="../dashboard/customer.html" class="bg-white/10 hover:bg-white/20 text-white text-xs px-4 py-2 rounded-lg font-bold transition duration-200">← Back to Dashboard</a>
    </nav>

    <!-- Main Workspace Container -->
    <main class="flex-grow flex items-center justify-center p-4 md:p-8">
        
        <div class="bg-white w-full max-w-md rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            <!-- Header Section -->
            <div class="bg-emerald-50 p-6 text-center border-b border-emerald-100">
                <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-3 text-3xl shadow-sm">
                    💰
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Fund Wallet</h2>
                <p class="text-sm text-gray-500 mt-1">Add money securely via Paystack</p>
            </div>

            <!-- Funding Form -->
            <form id="fundForm" class="p-6 space-y-5">
                
                <div>
                    <label for="amount" class="block text-sm font-semibold text-gray-700 mb-1">Enter Amount (₦)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-gray-500 font-bold">₦</span>
                        </div>
                        <input id="amount" type="number" min="100" max="500000" placeholder="1000" class="w-full pl-10 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition outline-none text-gray-800 font-bold text-lg" required>
                    </div>
                    <p class="text-xs text-gray-400 mt-2">Minimum deposit: ₦100</p>
                </div>

                <!-- Hidden inputs to hold user data securely -->
                <input type="hidden" id="userEmail" value="">
                <input type="hidden" id="userId" value="">

                <button type="submit" id="payBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl font-bold shadow-lg transition duration-200 mt-2 flex justify-center items-center uppercase tracking-wide text-sm">
                    <span>Pay with Paystack</span>
                </button>

            </form>

            <!-- Status Message -->
            <div id="statusMsg" class="hidden px-6 pb-6 text-center text-sm font-semibold"></div>
        </div>

    </main>

    <!-- Supabase & Paystack Controller Script -->
    <script type="module">
        import { supabase } from "../js/supabase-config.js";

        // Paystack Test Public Key (TODO: Replace with your actual Paystack Public Key)
        const PAYSTACK_PUBLIC_KEY = "pk_test_YOUR_PAYSTACK_KEY_HERE"; 

        // 1. Authenticate user and prepopulate hidden fields
        async function initializeFunding() {
            const { data: { user }, error } = await supabase.auth.getUser();
            
            if (!user || error) {
                window.location.href = "../login.html";
                return;
            }

            document.getElementById("userEmail").value = user.email;
            document.getElementById("userId").value = user.id;
        }

        initializeFunding();

        // 2. Handle form submission
        const fundForm = document.getElementById("fundForm");
        const payBtn = document.getElementById("payBtn");
        const statusMsg = document.getElementById("statusMsg");

        fundForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const amount = document.getElementById("amount").value;
            const email = document.getElementById("userEmail").value;
            const userId = document.getElementById("userId").value;

            if (PAYSTACK_PUBLIC_KEY === "pk_test_YOUR_PAYSTACK_KEY_HERE") {
                alert("Mr. CEO: You need to insert your Paystack Public Key in the code to run real tests. For now, we will simulate a successful payment!");
                processSuccessfulPayment(amount, userId, "simulated_ref_12345");
                return;
            }

            // Launch Paystack Popup
            let handler = PaystackPop.setup({
                key: PAYSTACK_PUBLIC_KEY,
                email: email,
                amount: amount * 100, // Paystack calculates in kobo
                currency: 'NGN',
                ref: 'MGN_' + Math.floor((Math.random() * 1000000000) + 1), // Generate random reference
                callback: function(response) {
                    // Payment successful
                    processSuccessfulPayment(amount, userId, response.reference);
                },
                onClose: function() {
                    statusMsg.className = "px-6 pb-6 text-center text-sm font-bold text-amber-600";
                    statusMsg.textContent = "Payment window closed.";
                    statusMsg.classList.remove("hidden");
                }
            });

            handler.openIframe();
        });

        // 3. Process the backend update after payment
        async function processSuccessfulPayment(amountPaid, uid, reference) {
            payBtn.disabled = true;
            payBtn.textContent = "Updating Wallet...";
            statusMsg.className = "hidden text-center text-sm font-semibold text-gray-500";
            statusMsg.textContent = "Securing funds in vault...";
            statusMsg.classList.remove("hidden");

            const numAmount = Number(amountPaid);

            try {
                // Step A: Fetch current balance
                const { data: profile, error: fetchError } = await supabase
                    .from('users')
                    .select('wallet_balance')
                    .eq('id', uid)
                    .single();

                if (fetchError) throw fetchError;

                const currentBalance = Number(profile.wallet_balance || 0);
                const newBalance = currentBalance + numAmount;

                // Step B: Update Wallet Balance
                const { error: updateError } = await supabase
                    .from('users')
                    .update({ wallet_balance: newBalance })
                    .eq('id', uid);

                if (updateError) throw updateError;

                // Step C: Write Transaction Receipt
                const { error: txError } = await supabase
                    .from('transactions')
                    .insert([{
                        user_id: uid,
                        service_type: 'wallet_funding',
                        description: `Paystack Deposit (Ref: ${reference})`,
                        amount: numAmount,
                        status: 'success'
                    }]);

                if (txError) throw txError;

                // Success Message & Redirect
                statusMsg.className = "px-6 pb-6 text-center text-sm font-bold text-emerald-600";
                statusMsg.textContent = `Successfully funded ₦${numAmount}! Redirecting to dashboard...`;
                
                setTimeout(() => {
                    window.location.href = "../dashboard/customer.html";
                }, 2000);

            } catch (err) {
                console.error("Funding Error:", err);
                statusMsg.className = "px-6 pb-6 text-center text-sm font-bold text-red-600";
                statusMsg.textContent = "Database Error: " + err.message;
            }
        }
    </script>
</body>
</html>
