<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaNet - Buy Airtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: { primary: '#0F2D52', secondary: '#00C2FF', accent: '#22C55E', background: '#F8FAFC' }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex flex-col bg-background font-sans text-gray-800">

    <!-- Top Navigation -->
    <nav class="bg-primary text-white px-6 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <span class="text-2xl font-bold tracking-wider text-secondary">MEGANET</span>
        </div>
        <div class="flex items-center space-x-4">
            <div class="hidden sm:block text-xs text-right bg-blue-900 px-3 py-1.5 rounded-lg border border-blue-800">
                <span class="text-gray-400 block" style="font-size: 0.65rem;">AVAILABLE BALANCE</span>
                <span id="navBalance" class="font-bold text-secondary">₦0.00</span>
            </div>
            <a href="../dashboard/customer.html" class="bg-white/10 hover:bg-white/20 text-white text-xs px-4 py-2 rounded-lg font-bold transition duration-200">← Dashboard</a>
        </div>
    </nav>

    <!-- Main Workspace Container -->
    <main class="flex-grow flex items-center justify-center p-4 md:p-8">
        
        <div class="bg-white w-full max-w-md rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            
            <!-- Header Section -->
            <div class="bg-cyan-50 p-6 text-center border-b border-cyan-100">
                <div class="w-16 h-16 bg-cyan-100 text-cyan-600 rounded-full flex items-center justify-center mx-auto mb-3 text-3xl shadow-sm">
                    ☎️
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Buy Airtime</h2>
                <p class="text-sm text-gray-500 mt-1">Instant Voice VTU Top-up</p>
            </div>

            <!-- Procurement Form -->
            <form id="airtimeForm" class="p-6 space-y-5">
                
                <!-- Network Selection -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Select Network</label>
                    <div class="grid grid-cols-4 gap-2">
                        <label class="border-2 border-gray-200 rounded-xl p-2 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50 transition text-center focus-within:border-yellow-400 bg-white">
                            <input type="radio" name="network" value="MTN" class="sr-only" required checked>
                            <span class="text-xs font-bold text-gray-800">MTN</span>
                        </label>
                        <label class="border-2 border-gray-200 rounded-xl p-2 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50 transition text-center focus-within:border-red-500 bg-white">
                            <input type="radio" name="network" value="Airtel" class="sr-only">
                            <span class="text-xs font-bold text-gray-800">Airtel</span>
                        </label>
                        <label class="border-2 border-gray-200 rounded-xl p-2 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50 transition text-center focus-within:border-green-500 bg-white">
                            <input type="radio" name="network" value="Glo" class="sr-only">
                            <span class="text-xs font-bold text-gray-800">Glo</span>
                        </label>
                        <label class="border-2 border-gray-200 rounded-xl p-2 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50 transition text-center focus-within:border-green-800 bg-white">
                            <input type="radio" name="network" value="9mobile" class="sr-only">
                            <span class="text-xs font-bold text-gray-800">9mobile</span>
                        </label>
                    </div>
                </div>

                <!-- Amount Selection -->
                <div>
                    <label for="amountInput" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Top-up Amount (₦)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-gray-500 font-bold">₦</span>
                        </div>
                        <input id="amountInput" type="number" min="50" max="50000" placeholder="1000" class="w-full pl-10 pr-4 py-3.5 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-secondary focus:border-secondary transition outline-none text-gray-800 font-bold text-lg" required>
                    </div>
                    <p class="text-xs text-gray-400 mt-2">Min: ₦50 | Max: ₦50,000</p>
                </div>

                <!-- Phone Number -->
                <div>
                    <label for="phoneInput" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Target Phone Number</label>
                    <input id="phoneInput" type="tel" placeholder="e.g. 09021944502" maxlength="11" minlength="11" class="w-full bg-slate-50 border border-gray-200 p-3.5 rounded-xl font-mono tracking-widest text-gray-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition" required>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-primary hover:bg-blue-900 text-white py-4 rounded-xl font-bold shadow-lg transition duration-200 mt-4 flex justify-center items-center uppercase tracking-wide text-sm">
                    <span>Execute Airtime Top-up</span>
                </button>

            </form>

            <!-- Status Message -->
            <div id="statusMessage" class="hidden px-6 pb-6 text-center text-sm font-semibold"></div>

        </div>
    </main>

    <!-- Supabase Execution Engine -->
    <script type="module">
        import { supabase } from "../js/supabase-config.js";

        let currentUser = null;
        let currentBalance = 0;

        // 1. Authenticate user and fetch current balance for validation
        async function initializeAirtimeModule() {
            const { data: { user }, error } = await supabase.auth.getUser();
            
            if (!user || error) {
                window.location.href = "../login.html";
                return;
            }
            
            currentUser = user;

            // Fetch current balance to display in the nav and validate purchases
            const { data: profile, error: profileError } = await supabase
                .from('users')
                .select('wallet_balance')
                .eq('id', user.id)
                .single();

            if (profile) {
                currentBalance = Number(profile.wallet_balance || 0);
                document.getElementById("navBalance").textContent = `₦${currentBalance.toLocaleString('en-NG', { minimumFractionDigits: 2 })}`;
            }
        }

        initializeAirtimeModule();

        // 2. Handle the procurement logic
        const airtimeForm = document.getElementById("airtimeForm");
        const submitBtn = document.getElementById("submitBtn");
        const statusMsg = document.getElementById("statusMessage");

        airtimeForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const amountCost = Number(document.getElementById("amountInput").value);
            const phoneNumber = document.getElementById("phoneInput").value;
            const network = document.querySelector('input[name="network"]:checked').value;
            const fullDescription = `${network} Airtime Top-up routed to ${phoneNumber}`;

            // Executive Balance Check (Pre-flight)
            if (currentBalance < amountCost) {
                statusMsg.className = "px-6 pb-6 text-center text-sm font-bold text-red-600 block";
                statusMsg.innerHTML = `Insufficient Funds. You need ₦${amountCost}, but your balance is ₦${currentBalance}. <br><a href="fund.html" class="text-blue-600 hover:underline mt-2 inline-block">Fund Wallet Here</a>`;
                return;
            }

            // Lock UI during execution
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Processing Top-up...
            `;
            statusMsg.className = "px-6 pb-6 text-center text-sm font-semibold text-gray-500 block";
            statusMsg.textContent = "Connecting to telecom dispatch channels...";

              try {
                // THE SECURE EXECUTIVE UPGRADE: Call the Postgres RPC
                const { data: rpcData, error: rpcError } = await supabase.rpc('process_vtu_transaction', {
                    p_amount: amountCost,
                    p_service_type: 'data',
                    p_description: fullDescription
                });

                if (rpcError) throw rpcError;

                // Step D: Simulation of VTpass/ConnectBridge API Success
                statusMsg.className = "px-6 pb-6 text-center text-sm font-bold text-emerald-600 block";
                statusMsg.innerHTML = `Data Provisioning Successful!<br><span class="font-normal text-xs text-gray-500">₦${amountCost} has been deducted from your wallet.</span>`;
                
                // Route back to dashboard after 3 seconds
                setTimeout(() => {
                    window.location.href = "../dashboard/customer.html";
                }, 3000);

            }
                catch (err) {

                // Step D: Simulation of API Success
                statusMsg.className = "px-6 pb-6 text-center text-sm font-bold text-emerald-600 block";
                statusMsg.innerHTML = `Airtime Provisioning Successful!<br><span class="font-normal text-xs text-gray-500">₦${amountCost} has been deducted from your wallet.</span>`;
                
                // Route back to dashboard after 3 seconds
                setTimeout(() => {
                    window.location.href = "../dashboard/customer.html";
                }, 3000);

            } catch (err) {
                console.error("Airtime Execution Error:", err);
                statusMsg.className = "px-6 pb-6 text-center text-sm font-bold text-red-600 block";
                statusMsg.textContent = "Transaction Failed: " + err.message;
                
                submitBtn.disabled = false;
                submitBtn.innerHTML = "<span>Execute Airtime Top-up</span>";
            }
        });

        // Add visual radio button focus handlers
        const radioLabels = document.querySelectorAll('label:has(input[type="radio"])');
        const radios = document.querySelectorAll('input[type="radio"]');
        
        radios.forEach(radio => {
            radio.addEventListener('change', () => {
                radioLabels.forEach(label => {
                    label.classList.remove('ring-2', 'ring-offset-2', 'border-transparent');
                    if(label.querySelector('input').value === 'MTN') label.classList.remove('ring-yellow-400');
                    if(label.querySelector('input').value === 'Airtel') label.classList.remove('ring-red-500');
                    if(label.querySelector('input').value === 'Glo') label.classList.remove('ring-green-500');
                    if(label.querySelector('input').value === '9mobile') label.classList.remove('ring-green-800');
                });
                
                const activeLabel = radio.closest('label');
                activeLabel.classList.add('ring-2', 'ring-offset-2', 'border-transparent');
                
                if(radio.value === 'MTN') activeLabel.classList.add('ring-yellow-400');
                if(radio.value === 'Airtel') activeLabel.classList.add('ring-red-500');
                if(radio.value === 'Glo') activeLabel.classList.add('ring-green-500');
                if(radio.value === '9mobile') activeLabel.classList.add('ring-green-800');
            });
        });
        
        // Trigger initial styling
        document.querySelector('input[name="network"]:checked').dispatchEvent(new Event('change'));
    </script>
</body>
</html>
